<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nex's Vault - Get Inspired</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins, sans-serif;
}

body{

height:100vh;

display:flex;

align-items:center;

justify-content:center;

flex-direction:column;

background:radial-gradient(circle,#141414,#050505);

color:white;

text-align:center;

}

/* glass card */

.card{

padding:50px;

border-radius:20px;

background:rgba(255,255,255,0.05);

border:1px solid rgba(255,255,255,0.1);

backdrop-filter:blur(20px);

}

/* title */

h1{

font-size:34px;

margin-bottom:10px;

}

p{

color:#aaa;

margin-bottom:30px;

}

/* button */

.pin-btn{

padding:14px 28px;

border-radius:12px;

background:#e60023;

color:white;

text-decoration:none;

font-weight:500;

transition:0.3s;

}

.pin-btn:hover{

transform:translateY(-3px);

box-shadow:0 8px 25px rgba(230,0,35,0.4);

}

.home{

display:block;

margin-top:25px;

color:#aaa;

text-decoration:none;

}

.home:hover{

color:white;

}

</style>

</head>

<body>

<div class="card">

<h1>Need Some Inspiration?</h1>

<p>Explore creative ideas and editing styles on Pinterest.</p>

<a class="pin-btn" href="https://www.pinterest.com" target="_blank">
Go to Pinterest
</a>

<a class="home" href="index.html">← Back to Nex's Vault</a>

</div>

</body>
</html>
