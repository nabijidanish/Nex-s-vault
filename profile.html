<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nex's Vault - Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins, sans-serif;
}

body{

height:100vh;

display:flex;

align-items:center;

justify-content:center;

flex-direction:column;

background:radial-gradient(circle,#141414,#050505);

color:white;

text-align:center;

}

/* cute robot */

.robot{

font-size:70px;
margin-bottom:10px;

animation:float 3s ease-in-out infinite;

}

/* floating animation */

@keyframes float{

0%{transform:translateY(0px)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0px)}

}

h1{

font-size:32px;
margin-top:10px;

}

p{

margin-top:8px;
color:#aaa;

}

.home{

margin-top:30px;

padding:10px 22px;

background:rgba(255,255,255,0.08);

border-radius:10px;

text-decoration:none;

color:white;

transition:0.3s;

}

.home:hover{

background:rgba(255,255,255,0.18);

transform:translateY(-2px);

}

</style>

</head>

<body>

<div class="robot">🤖</div>

<h1>Work in Progress</h1>

<p>We're still building the profile system.</p>

<a class="home" href="index.html">Go Back Home</a>

</body>
</html>
